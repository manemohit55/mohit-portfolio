name: Security Checks

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "30 0 * * 1"

jobs:
  audit-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate

      - name: Build
        run: npm run build
